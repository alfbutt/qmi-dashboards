<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quality Jobs · Agent Hub</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #111110; --surface: #1a1916; --surface2: #23221e;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
  --text: #f5f2ea; --muted: #8a8678;
  --accent: #c9960c; --accent-glow: rgba(201,150,12,0.2);
  --green: #34d399; --amber: #fbbf24; --red: #f87171;
  --jules: #c9960c; --ayessa: #e6b84a;
}
body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── HEADER ── */
.header {
  padding: 1.2rem 2.5rem; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; background: var(--bg); z-index: 100; backdrop-filter: blur(10px);
}
.header-brand { display: flex; align-items: center; gap: 0.85rem; }
.header-left h1 { font-size: 1.2rem; font-weight: 800; letter-spacing: -0.02em; }
.header-left p { font-size: 0.7rem; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 2px; }
.agent-badge {
  font-size: 0.58rem; font-family: 'DM Mono', monospace; letter-spacing: 0.1em; text-transform: uppercase;
  background: rgba(201,150,12,0.1); color: var(--accent); border: 1px solid rgba(201,150,12,0.25);
  border-radius: 100px; padding: 3px 10px;
}
.header-right { display: flex; align-items: center; gap: 10px; }
.live-badge {
  display: flex; align-items: center; gap: 6px; font-size: 0.68rem;
  font-family: 'DM Mono', monospace; color: var(--accent);
  background: rgba(201,150,12,0.1); border: 1px solid rgba(201,150,12,0.25);
  border-radius: 100px; padding: 4px 12px;
}
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── NAV ── */
.nav-tabs {
  display: flex; gap: 2px; padding: 0 2.5rem;
  border-bottom: 1px solid var(--border); background: var(--bg); overflow-x: auto;
}
.nav-tab {
  padding: 0.75rem 1.2rem; font-size: 0.75rem; font-family: 'DM Mono', monospace;
  color: var(--muted); cursor: pointer; border: none; background: none;
  border-bottom: 2px solid transparent; transition: all 0.2s; letter-spacing: 0.04em; white-space: nowrap;
}
.nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.nav-tab:hover:not(.active) { color: var(--text); }

/* ── MAIN ── */
.main { padding: 2rem 2.5rem; max-width: 1500px; margin: 0 auto; }
.page { display: none; }
.page.active { display: block; }

/* ── PLACEHOLDERS ── */
.coming-soon {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 55vh; gap: 0.65rem; text-align: center; opacity: 0.35;
}
.coming-soon-icon { font-size: 2.5rem; margin-bottom: 0.25rem; }
.coming-soon-title { font-size: 1rem; font-weight: 700; }
.coming-soon-sub { font-size: 0.7rem; font-family: 'DM Mono', monospace; color: var(--muted); }

/* ── LOADING ── */
.loading { display:flex; align-items:center; justify-content:center; height:300px; color:var(--muted); font-family:'DM Mono',monospace; font-size:0.82rem; flex-direction:column; gap:1rem; }
.spinner { width:28px; height:28px; border:2px solid var(--border2); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ── CLIENTS PAGE ── */
.clients-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.5rem; flex-wrap:wrap; gap:1rem; }
.clients-title { font-size:1.1rem; font-weight:800; letter-spacing:-0.02em; }
.clients-sub { font-size:0.7rem; font-family:'DM Mono',monospace; color:var(--muted); margin-top:3px; }
.clients-search { display:flex; gap:0.5rem; align-items:center; flex-wrap:wrap; }
.clients-search input {
  background:var(--surface); border:1px solid var(--border2); border-radius:8px;
  padding:0.48rem 0.85rem; color:var(--text); font-family:'DM Mono',monospace;
  font-size:0.76rem; outline:none; width:200px;
}
.clients-search input:focus { border-color:var(--accent); }
.clients-filter {
  background:var(--surface); border:1px solid var(--border2); border-radius:8px;
  padding:0.48rem 0.75rem; color:var(--muted); font-family:'DM Mono',monospace;
  font-size:0.72rem; cursor:pointer; transition:all 0.15s;
}
.clients-filter.active-filter { color:var(--accent); border-color:var(--accent); background:rgba(201,150,12,0.06); }
.clients-filter:hover:not(.active-filter) { color:var(--text); }

.clients-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(400px,1fr)); gap:1.25rem; }

.client-card {
  background:var(--surface); border:1px solid var(--border); border-radius:16px;
  overflow:hidden; transition:border-color 0.2s, box-shadow 0.2s; cursor:pointer;
}
.client-card:hover { border-color:var(--border2); box-shadow:0 4px 20px rgba(0,0,0,0.25); }
.client-card.expanded { border-color:rgba(201,150,12,0.35); }

.client-card-head {
  padding:1.1rem 1.4rem 1rem; display:flex; align-items:flex-start;
  justify-content:space-between; gap:0.75rem; border-bottom:1px solid var(--border);
}
.client-card-head-left { flex:1; min-width:0; }
.client-card-business { font-size:1.05rem; font-weight:700; letter-spacing:-0.01em; color:var(--text); line-height:1.2; margin-bottom:3px; }
.client-card-contact { font-size:0.73rem; font-family:'DM Mono',monospace; color:var(--muted); margin-bottom:6px; }
.client-card-meta { display:flex; gap:0.4rem; align-items:center; flex-wrap:wrap; }
.client-badge {
  font-size:0.58rem; font-family:'DM Mono',monospace; letter-spacing:0.08em;
  text-transform:uppercase; padding:2px 8px; border-radius:100px;
}
.client-badge.jules { background:rgba(201,150,12,0.12); color:var(--jules); border:1px solid rgba(201,150,12,0.25); }
.client-badge.ayessa { background:rgba(230,184,74,0.12); color:var(--ayessa); border:1px solid rgba(230,184,74,0.25); }
.client-badge.active-badge { background:rgba(52,211,153,0.1); color:var(--green); border:1px solid rgba(52,211,153,0.2); }
.client-card-head-right { display:flex; flex-direction:column; align-items:flex-end; gap:0.5rem; flex-shrink:0; }

.call-mode-btn {
  display:flex; align-items:center; gap:5px; flex-shrink:0;
  background:rgba(201,150,12,0.08); border:1px solid rgba(201,150,12,0.3);
  border-radius:8px; padding:5px 12px; color:var(--accent);
  font-family:'DM Mono',monospace; font-size:0.64rem; font-weight:700;
  cursor:pointer; letter-spacing:0.04em; transition:all 0.2s; white-space:nowrap;
}
.call-mode-btn:hover { background:rgba(201,150,12,0.18); border-color:var(--accent); }

/* Summary strip — always visible */
.client-card-summary {
  padding:0.7rem 1.4rem; display:grid; grid-template-columns:repeat(3,1fr); gap:0.5rem 1rem;
  border-bottom:1px solid var(--border); background:rgba(255,255,255,0.01);
}
.client-summary-item { display:flex; flex-direction:column; gap:1px; }
.client-summary-lbl { font-size:0.55rem; font-family:'DM Mono',monospace; color:var(--muted); letter-spacing:0.07em; text-transform:uppercase; }
.client-summary-val { font-size:0.75rem; font-family:'DM Mono',monospace; color:var(--text); line-height:1.35; }
.client-summary-val.empty { color:var(--muted); opacity:0.4; font-style:italic; }

/* Expand toggle */
.client-expand-toggle {
  padding:0.5rem 1.4rem; display:flex; align-items:center; justify-content:space-between;
  font-size:0.68rem; font-family:'DM Mono',monospace; color:var(--muted); letter-spacing:0.05em;
  border-bottom:1px solid transparent; transition:color 0.15s;
}
.client-card.expanded .client-expand-toggle { color:var(--accent); border-bottom-color:var(--border); }
.client-expand-arrow { transition:transform 0.25s; display:inline-block; }
.client-card.expanded .client-expand-arrow { transform:rotate(180deg); }

/* Expandable body — grid animation */
.client-card-expand { display:grid; grid-template-rows:0fr; transition:grid-template-rows 0.3s ease; }
.client-card.expanded .client-card-expand { grid-template-rows:1fr; }
.client-card-expand > div { overflow:hidden; }

.client-card-body { padding:1rem 1.4rem 1.25rem; }
.client-section-lbl {
  font-size:0.58rem; font-family:'DM Mono',monospace; color:var(--accent);
  letter-spacing:0.1em; text-transform:uppercase; margin:1rem 0 0.5rem;
  padding-bottom:0.3rem; border-bottom:1px solid rgba(201,150,12,0.15);
}
.client-section-lbl:first-child { margin-top:0; }
.client-fields { display:grid; grid-template-columns:1fr 1fr; gap:0.55rem 1rem; }
.client-field { display:flex; flex-direction:column; gap:2px; }
.client-field.full { grid-column:1/-1; }
.client-field-lbl { font-size:0.57rem; font-family:'DM Mono',monospace; color:var(--muted); letter-spacing:0.06em; text-transform:uppercase; }
.client-field-val { font-size:0.76rem; font-family:'DM Mono',monospace; color:var(--text); line-height:1.45; }
.client-field-val.empty { color:var(--muted); opacity:0.35; font-style:italic; }
.client-field-val.prose { font-family:'Syne',sans-serif; font-size:0.8rem; color:var(--fg); line-height:1.6; }
.client-field-val a { color:var(--accent); text-decoration:none; }
.client-field-val a:hover { text-decoration:underline; }

/* ── OVERVIEW TAB ── */
.overview-grid { display: grid; grid-template-columns: 1fr; gap: 1rem; margin-bottom: 2rem; }
.overview-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
  padding: 1rem 1.5rem; display: grid;
  grid-template-columns: 1fr 80px 75px 75px 85px 70px 70px 90px 90px 100px;
  align-items: center; gap: 0.75rem; transition: background 0.15s;
}
.overview-card:hover { background: var(--surface2); }
.overview-card.header-row {
  background: rgba(255,255,255,0.02); border-radius: 10px;
  font-size: 0.62rem; font-family: 'DM Mono', monospace; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--muted); padding: 0.6rem 1.5rem;
}
.period-select {
  background: var(--surface2); border: 1px solid var(--border2); color: var(--text);
  border-radius: 8px; padding: 5px 10px; font-size: 0.73rem; font-family: 'DM Mono', monospace;
  cursor: pointer; outline: none;
}
.ov-client { font-weight: 700; font-size: 0.88rem; }
.ov-agent { font-size: 0.68rem; font-family: 'DM Mono', monospace; color: var(--muted); margin-top: 2px; }
.ov-val { font-family: 'DM Mono', monospace; font-size: 0.88rem; text-align: center; }
.ov-val.big { font-size: 1.1rem; font-weight: 700; }
.section-divider {
  font-size: 0.65rem; font-family: 'DM Mono', monospace; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--muted); padding: 0.5rem 0; margin: 0.5rem 0;
  border-bottom: 1px solid var(--border);
}

/* ── CALLBACKS TAB ── */
.primary-btn { background: var(--accent); color: #000; border: none; border-radius: 10px; padding: 0.7rem 1.4rem; font-size: 0.78rem; font-family: 'DM Mono', monospace; font-weight: 700; cursor: pointer; transition: opacity 0.15s; }
.primary-btn:hover { opacity: 0.85; }
.cb-setup { max-width: 480px; margin: 2rem auto; display: flex; flex-direction: column; gap: 1rem; }
.cb-setup h2 { font-size: 1rem; font-weight: 700; color: var(--text); margin: 0; }
.cb-setup p { font-size: 0.75rem; color: var(--muted); margin: 0; line-height: 1.6; }
.cb-setup input { background: var(--surface); border: 1px solid var(--border2); border-radius: 10px; padding: 0.7rem 1rem; font-size: 0.78rem; color: var(--text); font-family: 'DM Mono', monospace; width: 100%; box-sizing: border-box; }
.cb-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
.cb-badge { display: inline-flex; align-items: center; justify-content: center; background: #ef4444; color: #fff; border-radius: 100px; font-size: 0.62rem; font-weight: 700; min-width: 18px; height: 18px; padding: 0 5px; margin-left: 6px; }
.cb-list { display: flex; flex-direction: column; gap: 0.75rem; }
.cb-card { background: var(--surface); border: 1px solid var(--border2); border-radius: 16px; padding: 1.25rem 1.4rem; display: flex; align-items: flex-start; gap: 1rem; transition: opacity 0.2s; position: relative; }
.cb-card.done { opacity: 0.38; }
.cb-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; border-radius: 16px 0 0 16px; background: #ef4444; }
.cb-card.done::before { background: var(--border2); }
.cb-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border2); background: none; cursor: pointer; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; color: transparent; font-size: 0.7rem; transition: all 0.15s; }
.cb-card.done .cb-check { background: var(--green); border-color: var(--green); color: #000; }
.cb-body { flex: 1; min-width: 0; }
.cb-company { font-size: 0.85rem; font-weight: 700; color: var(--text); margin-bottom: 0.2rem; }
.cb-name { font-size: 0.78rem; color: var(--muted); margin-bottom: 0.6rem; }
.cb-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.cb-time { font-size: 0.65rem; font-family: 'DM Mono', monospace; color: var(--muted); }
.cb-ghl-btn { display: inline-flex; align-items: center; gap: 5px; background: none; border: 1px solid var(--border2); border-radius: 8px; padding: 4px 10px; font-size: 0.68rem; font-family: 'DM Mono', monospace; color: var(--accent); cursor: pointer; text-decoration: none; transition: all 0.15s; }
.cb-ghl-btn:hover { background: rgba(201,150,12,0.1); border-color: var(--accent); }
.cb-empty { text-align: center; padding: 3rem; color: var(--muted); font-size: 0.78rem; font-family: 'DM Mono', monospace; }
.cb-settings-btn { background: none; border: 1px solid var(--border2); border-radius: 8px; padding: 5px 12px; font-size: 0.68rem; font-family: 'DM Mono', monospace; color: var(--muted); cursor: pointer; }

/* ── CALL MODE MODAL ── */
.call-mode-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.88); z-index:2000;
  display:flex; align-items:center; justify-content:center; padding:1rem;
  opacity:0; pointer-events:none; transition:opacity 0.2s;
}
.call-mode-overlay.open { opacity:1; pointer-events:all; }
.call-mode-panel {
  width:min(580px,96vw); max-height:92vh; overflow-y:auto;
  background:var(--surface); border:1px solid var(--border2); border-radius:20px;
  transform:translateY(18px); transition:transform 0.22s;
}
.call-mode-overlay.open .call-mode-panel { transform:translateY(0); }

.cm-header {
  padding:1.2rem 1.5rem; border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; background:var(--surface); z-index:5; border-radius:20px 20px 0 0;
}
.cm-label { font-size:0.58rem; font-family:'DM Mono',monospace; color:var(--accent); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:3px; }
.cm-client-name { font-size:1.15rem; font-weight:800; letter-spacing:-0.02em; display:flex; align-items:center; gap:0.5rem; flex-wrap:wrap; }
.cm-close {
  background:none; border:1px solid var(--border2); border-radius:8px;
  color:var(--muted); font-size:0.95rem; cursor:pointer; padding:0.3rem 0.65rem; transition:all 0.2s; flex-shrink:0;
}
.cm-close:hover { color:var(--text); border-color:rgba(255,255,255,0.2); }

.cm-body { padding:1.25rem 1.5rem; display:flex; flex-direction:column; gap:0.85rem; }

.cm-block { background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:0.95rem 1.2rem; }
.cm-block.highlight { background:rgba(201,150,12,0.06); border-color:rgba(201,150,12,0.22); }
.cm-block.danger { background:rgba(248,113,113,0.05); border-color:rgba(248,113,113,0.22); }
.cm-block-label {
  font-size:0.57rem; font-family:'DM Mono',monospace; color:var(--muted);
  letter-spacing:0.1em; text-transform:uppercase; margin-bottom:0.45rem;
}
.cm-block.highlight .cm-block-label { color:var(--accent); }
.cm-block.danger .cm-block-label { color:var(--red); }
.cm-block-value { font-size:0.9rem; font-weight:700; color:var(--text); line-height:1.5; }
.cm-block-value.big { font-size:1.2rem; }
.cm-block-value.prose { font-family:'Syne',sans-serif; font-size:0.84rem; font-weight:400; color:var(--muted); line-height:1.65; }

.cm-two-col { display:grid; grid-template-columns:1fr 1fr; gap:0.85rem; }

.cm-bullets { display:flex; flex-direction:column; gap:0.4rem; }
.cm-bullet { display:flex; align-items:flex-start; gap:0.5rem; font-size:0.82rem; color:var(--text); line-height:1.45; }
.cm-bullet::before { content:'✕'; color:var(--red); font-size:0.62rem; flex-shrink:0; margin-top:3px; font-weight:900; }

.cm-tip {
  background:rgba(52,211,153,0.06); border:1px solid rgba(52,211,153,0.18);
  border-radius:12px; padding:0.85rem 1.1rem;
  font-size:0.73rem; font-family:'DM Mono',monospace; color:var(--green);
  line-height:1.6; text-align:center; font-style:italic;
}
.cm-footer {
  padding:1rem 1.5rem; border-top:1px solid var(--border);
  display:flex; justify-content:flex-end;
}
.cm-footer-btn {
  background:var(--surface2); border:1px solid var(--border2); border-radius:10px;
  color:var(--muted); font-family:'DM Mono',monospace; font-size:0.72rem;
  padding:0.6rem 1.4rem; cursor:pointer; transition:all 0.2s;
}
.cm-footer-btn:hover { color:var(--text); border-color:rgba(255,255,255,0.2); }

@media (max-width:800px) {
  .main { padding:1.5rem 1.25rem; }
  .header { padding:1rem 1.25rem; }
  .nav-tabs { padding:0 1.25rem; }
  .clients-grid { grid-template-columns:1fr; }
  .cm-two-col { grid-template-columns:1fr; }
  .client-card-head { flex-direction:column; gap:0.75rem; }
  .today-banner { grid-template-columns:1fr; }
  .metrics-strip { grid-template-columns:1fr 1fr; }
  .appt-hero { grid-template-columns:1fr 1fr; }
  .client-grid { grid-template-columns:1fr; }
}

/* ── CALLS PAGE ── */
:root { --green-bg:rgba(52,211,153,0.1); --amber-bg:rgba(251,191,36,0.1); --red-bg:rgba(248,113,113,0.1); }
.last-updated { font-size:0.65rem; font-family:'DM Mono',monospace; color:var(--muted); text-align:right; margin-bottom:1.5rem; opacity:0.5; }
.today-banner { display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:2rem; }
.agent-card { border-radius:16px; padding:1.5rem; border:1px solid var(--border2); position:relative; overflow:hidden; }
.agent-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; }
.agent-card.jules { background:linear-gradient(135deg,rgba(201,150,12,0.06),var(--surface)); }
.agent-card.jules::before { background:var(--jules); }
.agent-card.ayessa { background:linear-gradient(135deg,rgba(230,184,74,0.06),var(--surface)); }
.agent-card.ayessa::before { background:var(--ayessa); }
.agent-name { font-size:0.7rem; font-family:'DM Mono',monospace; letter-spacing:0.12em; text-transform:uppercase; margin-bottom:0.75rem; }
.agent-card.jules .agent-name { color:var(--jules); }
.agent-card.ayessa .agent-name { color:var(--ayessa); }
.agent-count { font-size:3.5rem; font-weight:800; letter-spacing:-0.04em; line-height:1; margin-bottom:0.25rem; }
.agent-card.jules .agent-count { color:var(--jules); }
.agent-card.ayessa .agent-count { color:var(--ayessa); }
.agent-sub { font-size:0.78rem; color:var(--muted); }
.agent-clients { margin-top:1rem; font-size:0.75rem; color:var(--muted); font-family:'DM Mono',monospace; line-height:1.7; }
.agent-appt-stat { margin-top:1rem; padding-top:1rem; border-top:1px solid var(--border2); }
.agent-appt-count { font-size:2.2rem; font-weight:800; letter-spacing:-0.04em; line-height:1; margin-bottom:0.2rem; }
.agent-card.jules .agent-appt-count { color:var(--jules); opacity:0.8; }
.agent-card.ayessa .agent-appt-count { color:var(--ayessa); opacity:0.8; }
.agent-appt-label { font-size:0.72rem; color:var(--muted); }
.leader-tag { display:inline-block; font-size:0.65rem; padding:2px 8px; border-radius:100px; font-family:'DM Mono',monospace; margin-left:8px; vertical-align:middle; }
.leader-tag.jules { background:rgba(201,150,12,0.2); color:var(--jules); border:1px solid rgba(201,150,12,0.3); }
.leader-tag.ayessa { background:rgba(230,184,74,0.2); color:var(--ayessa); border:1px solid rgba(230,184,74,0.3); }

function _findClientOverride(name) {
  if (!name) return {};
  const exact = CLIENT_OVERVIEW_DATA[name];
  if (exact) return exact;
  const nl = name.toLowerCase().replace(/\s+/g,'');
  const found = Object.entries(CLIENT_OVERVIEW_DATA).find(([k]) => {
    const kl = k.toLowerCase().replace(/\s+/g,'');
    return kl === nl || nl.includes(kl.slice(0,8)) || kl.includes(nl.slice(0,8));
  });
  return found ? found[1] : {};
}

function fmt(n) { return (n === null || n === undefined) ? '—' : n.toLocaleString(); }

function parseDateStr(raw) {
  if (!raw) return null;
  const m = raw.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (m) return new Date(+m[3], +m[2]-1, +m[1]);
  const d = new Date(raw); return isNaN(d) ? null : d;
}

function getWeekKey(date) {
  const d = new Date(date); d.setHours(0,0,0,0);
  d.setDate(d.getDate() - d.getDay() + 1);
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
}

function getTodayStr() {
  const t = new Date();
  return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
}

function getAgent(name) {
  const n = (name||'').trim().toLowerCase();
  if (JULES_ACCOUNTS.some(a => a.toLowerCase() === n)) return 'Jules';
  if (AYESSA_ACCOUNTS.some(a => a.toLowerCase() === n)) return 'Ayessa';
  return null;
}

function kpiClass(val, daysLive) {
  if (val === null || val === undefined || typeof val !== 'number') return 'neutral';
  const days = Math.min(Math.max(daysLive || 30, 1), 30);
  const scale = days / 30;
  if (val >= Math.ceil(8 * scale)) return 'green';
  if (val >= Math.ceil(4 * scale)) return 'amber';
  return 'red';
}

function kpiDot(cls) {
  const icons = {green:'●', amber:'●', red:'●', neutral:'○'};
  return `<span class="kpi-pill ${cls}">${icons[cls]} ${cls.toUpperCase()}</span>`;
}

function daysLiveLabel(daysLive, liveDate) {
  if (daysLive === undefined || daysLive === null) return '';
  const liveText = daysLive === 0 ? 'went live today'
    : daysLive === 1 ? 'went live 1 day ago'
    : daysLive < 30  ? `went live ${daysLive} days ago`
    : daysLive < 60  ? `live ${Math.floor(daysLive/7)} weeks`
    : `live ${Math.floor(daysLive/30)} months`;
  let dateStr = '';
  if (liveDate) {
    const d = liveDate instanceof Date ? liveDate : new Date(liveDate);
    const day = d.getDate(), v = day % 100;
    const suffix = (v >= 11 && v <= 13) ? 'th' : (['th','st','nd','rd'][day % 10] || 'th');
    const mo = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    dateStr = `${day}${suffix} ${mo[d.getMonth()]} ${d.getFullYear()}`;
  }
  return `<span class="days-live">· ${liveText}${dateStr ? `<br>${dateStr}` : ''}</span>`;
}

function getConfig(name) {
  if (!window._configData) return { daysLive: 30, target: 10 };
  const exact = window._configData[name];
  if (exact) return exact;
  const fuzzy = Object.keys(window._configData).find(k =>
    k.toLowerCase().replace(/\s+/g,'') === name.toLowerCase().replace(/\s+/g,'') ||
    name.toLowerCase().includes(k.toLowerCase().slice(0,6))
  );
  return fuzzy ? window._configData[fuzzy] : { daysLive: 30, target: 10 };
}

function fmtCurrency(n) {
  if (n === null || n === undefined || n === 0) return '—';
  return '$' + Math.round(n).toLocaleString('en-AU');
}

async function fetchAdsData() {
  try {
    const res = await fetch(`${PROXY_URL}?id=${ADS_SHEET_ID}&sheet=STATS%20DASHBOARD`);
    if (!res.ok) return {};
    const rows = await res.json();
    if (!Array.isArray(rows) || rows.length < 2) return {};
    const data = {};
    for (let i = 1; i < rows.length; i++) {
      const row  = rows[i];
      const name = String(row[1]||'').trim();
      const spent = parseFloat(String(row[5]).replace(/[^0-9.]/g,'')) || 0;
      const leads = parseInt(row[6]) || 0;
      const cpl   = parseFloat(String(row[7]).replace(/[^0-9.]/g,'')) || 0;
      if (!name) continue;
      data[name] = { spent, leads, cpl };
    }
    return data;
  } catch(e) { console.warn('Ads fetch failed:', e); return {}; }
}

function getAds(name) {
  if (!window._adsData) return null;
  const exact = window._adsData[name];
  if (exact) return exact;
  const key = Object.keys(window._adsData).find(k =>
    k.toLowerCase().replace(/\s+/g,'') === name.toLowerCase().replace(/\s+/g,'') ||
    name.toLowerCase().includes(k.toLowerCase().slice(0,6)) ||
    k.toLowerCase().includes(name.toLowerCase().slice(0,6))
  );
  return key ? window._adsData[key] : null;
}

function renderOverview() {
  const callsData = window._callsData;
  const apptsData = window._apptsData;
  const el = document.getElementById('app-overview');
  if (!callsData || !apptsData) {
    el.innerHTML = '<div class="loading">Waiting for data...</div>';
    return;
  }

  function clientCallsInPeriod(name, days) {
    const subDay = callsData.subDay || {};
    const today = new Date(); today.setHours(0,0,0,0);
    const cutoff = new Date(today.getTime() - days * 24*60*60*1000);
    let total = 0;
    for (const [dateStr, count] of Object.entries(subDay[name] || {})) {
      if (new Date(dateStr) >= cutoff) total += count;
    }
    return total;
  }

  function buildRows(clientNames, agent) {
    return clientNames.map(name => {
      const calls = clientCallsInPeriod(name, overviewPeriod);
      const apptClients = agent === 'Jules' ? apptsData.julesClients : apptsData.ayessaClients;
      const apptMatch = apptClients.find(c => c.name.toLowerCase().replace(/\s+/g,'') === name.toLowerCase().replace(/\s+/g,''))
                     || apptClients.find(c => name.toLowerCase().includes(c.name.toLowerCase().slice(0,6)));
      const appts = apptMatch?.last30 ?? null;
      const callRatio = (appts && appts > 0) ? (calls / appts).toFixed(1) : '—';
      const cfg = getConfig(apptMatch?.name || name);
      const cls = (typeof appts === 'number') ? kpiClass(appts, cfg.daysLive) : 'neutral';
      const agentColor = agent === 'Jules' ? 'var(--jules)' : 'var(--ayessa)';
      const ads = getAds(name);
      const spent  = ads ? fmtCurrency(ads.spent) : '—';
      const leads  = ads ? fmt(ads.leads) : '—';
      const leadBookPct = (ads && ads.leads > 0 && appts !== null)
        ? Math.round((appts / ads.leads) * 100) + '%' : '—';
      const costPerBooking = (ads && ads.spent > 0 && appts)
        ? fmtCurrency(ads.spent / appts) : '—';
      return `
        <div class="overview-card">
          <div>
            <div class="ov-client">${name}${daysLiveLabel(cfg.daysLive, cfg.liveDate)}</div>
            <div class="ov-agent" style="color:${agentColor}">${agent}</div>
          </div>
          <div class="ov-val" style="color:${agentColor}">${fmt(calls)}</div>
          <div class="ov-val">${appts !== null ? fmt(appts) : '—'}</div>
          <div class="ov-val">${callRatio !== '—' ? callRatio+':1' : '—'}</div>
          <div class="ov-val" style="color:var(--amber)">${spent}</div>
          <div class="ov-val">${leads}</div>
          <div class="ov-val">${ads ? fmtCurrency(ads.cpl) : '—'}</div>
          <div class="ov-val">${leadBookPct}</div>
          <div class="ov-val" style="color:var(--green)">${costPerBooking}</div>
          <div class="ov-val">${kpiDot(cls)}</div>
        </div>`;
    }).join('');
  }

  el.innerHTML = `
    <div class="last-updated">last synced · ${new Date().toLocaleString('en-AU',{timeZone:'Australia/Melbourne',hour:'2-digit',minute:'2-digit',day:'2-digit',month:'short'})}</div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;">
      <div style="font-size:0.68rem;font-family:'DM Mono',monospace;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;">client overview</div>
      <div style="display:flex;align-items:center;gap:8px;font-size:0.73rem;font-family:'DM Mono',monospace;color:var(--muted);">
        period
        <select class="period-select" onchange="switchOverviewPeriod(parseInt(this.value))">
          <option value="30" ${overviewPeriod===30?'selected':''}>Last 30 days</option>
          <option value="60" ${overviewPeriod===60?'selected':''}>Last 60 days</option>
          <option value="90" ${overviewPeriod===90?'selected':''}>Last 90 days</option>
        </select>
      </div>
    </div>
    <div class="overview-card header-row">

// FETCH — update Jules/Ayessa account lists from Sheets
// ════════════════════════════════════════════════
async function _fetchClientsList() {
  try {
    const res  = await fetch(`${PROXY_URL}?id=${CLIENTS_SHEET_ID}&sheet=Clients`);
    const rows = await res.json();
    if (!Array.isArray(rows) || rows.length < 2) return;
    const jules = [], ayessa = [];
    for (let i = 1; i < rows.length; i++) {
      const name   = String(rows[i][0] || '').trim();
      const agent  = String(rows[i][1] || '').trim();
      const status = String(rows[i][8] || '').trim();
      if (!name || status === 'Churned') continue;
      if (agent === 'Jules')  jules.push(name);
      if (agent === 'Ayessa') ayessa.push(name);
    }
    if (jules.length || ayessa.length) {
      JULES_ACCOUNTS  = jules.length  ? jules  : JULES_FALLBACK;
      AYESSA_ACCOUNTS = ayessa.length ? ayessa : AYESSA_FALLBACK;
    }
  } catch(e) { /* use fallback lists */ }
}

// ════════════════════════════════════════════════
// FETCH — CALLS
// ════════════════════════════════════════════════
async function fetchCallsData() {
  try {
    const res = await fetch(`${PROXY_URL}?id=${CALLS_SHEET_ID}&sheet=Raw%20Data`);
    if (!res.ok) return null;
    const rows = await res.json();
    if (!Array.isArray(rows) || rows.length < 2) return null;

    const today = getTodayStr();
    const agentDay={}, agentWeek={}, agentMonth={}, subMonth={}, subDay={};
    const todayJules={total:0,clients:[]}, todayAyessa={total:0,clients:[]};
    const allDates=new Set(), allWeeks=new Set();

    for (let i = 1; i < rows.length; i++) {
      const row = rows[i];
      const monthName = String(row[0]||'').trim();
      const subRaw    = String(row[5]||'').trim();
      const dateRaw   = String(row[1]||'').trim();
      if (!monthName || !subRaw) continue;
      if (!TARGET_MONTHS.has(monthName)) continue;
      const agent = getAgent(subRaw);
      if (!agent) continue;
      const dateObj = parseDateStr(dateRaw);
      if (!dateObj) continue;
      const year = dateObj.getFullYear();
      if (year === 2025 && MONTH_ORDER[monthName] >= 10) continue;

      const dStr = `${year}-${String(dateObj.getMonth()+1).padStart(2,'0')}-${String(dateObj.getDate()).padStart(2,'0')}`;
      const wKey = getWeekKey(dateObj);
      allDates.add(dStr); allWeeks.add(wKey);

      if (!agentDay[agent])   agentDay[agent]={};
      if (!agentWeek[agent])  agentWeek[agent]={};
      if (!agentMonth[agent]) agentMonth[agent]={};
      agentDay[agent][dStr]        = (agentDay[agent][dStr]        || 0) + 1;
      agentWeek[agent][wKey]       = (agentWeek[agent][wKey]       || 0) + 1;
      agentMonth[agent][monthName] = (agentMonth[agent][monthName] || 0) + 1;

      if (!subMonth[subRaw]) subMonth[subRaw]={};
      subMonth[subRaw][monthName] = (subMonth[subRaw][monthName] || 0) + 1;
      if (!subDay[subRaw]) subDay[subRaw]={};
      subDay[subRaw][dStr] = (subDay[subRaw][dStr] || 0) + 1;

      if (dStr === today) {
        const bucket = agent === 'Jules' ? todayJules : todayAyessa;
        bucket.total++;
        const ex = bucket.clients.findIndex(c => c.startsWith(subRaw + ':'));
        if (ex >= 0) { const n = parseInt(bucket.clients[ex].split(': ')[1]) + 1; bucket.clients[ex] = `${subRaw}: ${n}`; }
        else bucket.clients.push(`${subRaw}: 1`);
      }
    }

    const sortedDates = [...allDates].sort();
    const sortedWeeks = [...allWeeks].sort((a,b) => {
      const [da,ma,ya]=a.split('/'), [db,mb,yb]=b.split('/');
      return new Date(+ya,+ma-1,+da) - new Date(+yb,+mb-1,+db);
    });
    const sortedMonths = ['March','April','May','June','July','August','September','October','November','December'];

    const julesClients={}, ayessaClients={};
    for (const acc of JULES_ACCOUNTS)  if (subMonth[acc]) julesClients[acc]  = subMonth[acc];
    for (const acc of AYESSA_ACCOUNTS) if (subMonth[acc]) ayessaClients[acc] = subMonth[acc];

    return {
      today: { jules: todayJules, ayessa: todayAyessa },
      daily:   { dates: sortedDates,  jules: sortedDates.map(d=>(agentDay['Jules']||{})[d]||0),   ayessa: sortedDates.map(d=>(agentDay['Ayessa']||{})[d]||0)   },
      weekly:  { weeks: sortedWeeks,  jules: sortedWeeks.map(w=>(agentWeek['Jules']||{})[w]||0),  ayessa: sortedWeeks.map(w=>(agentWeek['Ayessa']||{})[w]||0)  },
      monthly: { months: sortedMonths, jules: sortedMonths.map(m=>(agentMonth['Jules']||{})[m]||0), ayessa: sortedMonths.map(m=>(agentMonth['Ayessa']||{})[m]||0) },
      julesClients, ayessaClients, subMonth, subDay,
    };
  } catch(e) { console.warn('Calls fetch failed:', e); return null; }
}

// FETCH — TODAY'S APPOINTMENT COUNTS
// ════════════════════════════════════════════════
async function fetchTodayApptCounts() {
  // Appointments sheet has no raw-data tab — read last-7-days totals from Summary
  try {
    const res = await fetch(`${PROXY_URL}?id=${APPT_SHEET_ID}&sheet=Summary`);
    if (!res.ok) throw new Error('summary fetch failed');
    const rows = await res.json();
    if (!Array.isArray(rows) || rows.length < 2) throw new Error('empty');
    let jules = 0, ayessa = 0;
    for (let i = 1; i < rows.length; i++) {
      const row   = rows[i];
      const name  = String(row[0]||'').trim();
      const agent = String(row[1]||'').trim();
      if (!name || !agent) continue;
      if (name.includes('▶') || name.includes('TOTAL') || name.includes('GRAND')) continue;
      const last7 = parseInt(row[3]) || 0;  // col index 3 = "Last 7 Days"
      if (agent === 'Jules')                  jules  += last7;
      else if (agent === 'Ayessa' || agent === 'Ayesa') ayessa += last7;
    }
    return { jules, ayessa };
  } catch(e) { return { jules: 0, ayessa: 0 }; }
}

// ════════════════════════════════════════════════
// FETCH — APPOINTMENTS SUMMARY
// ════════════════════════════════════════════════
async function fetchApptsData() {
  try {
    const res = await fetch(`${PROXY_URL}?id=${APPT_SHEET_ID}&sheet=Summary`);
    if (!res.ok) return null;
    const rows = await res.json();
    if (!Array.isArray(rows) || rows.length < 2) return null;
    const clients = [];
    for (let i = 1; i < rows.length; i++) {
      const row = rows[i];
      const name  = String(row[0]||'').trim();
      const agent = String(row[1]||'').trim();
      if (!name || !agent) continue;
      if (name.includes('▶') || name.includes('TOTAL') || name.includes('GRAND')) continue;
      if (agent !== 'Jules' && agent !== 'Ayessa' && agent !== 'Ayesa') continue;
      const last7=parseInt(row[3])||0, last14=parseInt(row[4])||0, last30=parseInt(row[5])||0, allTime=parseInt(row[6])||0;
      clients.push({ name: name.trim(), agent: agent === 'Ayesa' ? 'Ayessa' : agent, last7, last14, last30, allTime });
    }
    const julesClients  = clients.filter(c => c.agent === 'Jules');
    const ayessaClients = clients.filter(c => c.agent === 'Ayessa');
    const jTotals = {last7:0,last14:0,last30:0,allTime:0};
    const aTotals = {last7:0,last14:0,last30:0,allTime:0};
    julesClients.forEach(c  => { jTotals.last7+=c.last7; jTotals.last14+=c.last14; jTotals.last30+=c.last30; jTotals.allTime+=c.allTime; });
    ayessaClients.forEach(c => { aTotals.last7+=c.last7; aTotals.last14+=c.last14; aTotals.last30+=c.last30; aTotals.allTime+=c.allTime; });
    return { clients, julesClients, ayessaClients, jTotals, aTotals };
  } catch(e) { console.warn('Appts fetch failed:', e); return null; }
}

async function fetchClientConfig() {
  try {
    const res = await fetch(`${PROXY_URL}?id=${APPT_SHEET_ID}&sheet=Client%20Config`);
    if (!res.ok) return {};
    const rows = await res.json();
    if (!Array.isArray(rows) || rows.length < 2) return {};
    const config = {};
    const today = new Date(); today.setHours(0,0,0,0);
    for (let i = 1; i < rows.length; i++) {
      const row = rows[i];
      const name    = String(row[0]||'').trim();
      const dateRaw = String(row[1]||'').trim();
      if (!name || !dateRaw) continue;
      const liveDate = parseDateStr(dateRaw);
      if (!liveDate) continue;
      const daysLive = Math.max(0, Math.floor((today - liveDate) / 86400000));
      config[name] = { liveDate, daysLive, target: parseInt(row[2])||10 };
    }
    return config;
  } catch(e) { return {}; }
}

function _renderClientCallBars(agent, clients) {
  const color = agent === 'jules' ? 'var(--jules)' : 'var(--ayessa)';
  const label = agent === 'jules' ? 'Jules · call volume by client' : 'Ayessa · call volume by client';
  const rows  = Object.entries(clients)
    .map(([name, vals]) => ({ name, total: Object.values(vals).reduce((a,b)=>a+b,0) }))
    .sort((a,b) => b.total - a.total);
  const max = rows[0]?.total || 1;
  return `<div class="client-section">
    <div class="client-header ${agent}">${label}</div>
    ${rows.map(r => `
      <div class="client-row">
        <div class="client-name">${r.name}</div>
        <div class="client-bar-wrap"><div class="client-bar" style="width:${Math.round(r.total/max*100)}%;background:${color};opacity:0.7;"></div></div>
        <div class="client-count">${fmt(r.total)}</div>
      </div>`).join('')}
  </div>`;
}

function _drawChart(data) {
  if (charts.main) { charts.main.destroy(); }
  const ctx = document.getElementById('mainChart');
  if (!ctx) return;
  let labels, julesData, ayessaData;
  if (currentView === 'daily')   { labels=data.daily.dates.map(d=>d.slice(5));         julesData=data.daily.jules;   ayessaData=data.daily.ayessa; }
  else if (currentView === 'weekly')  { labels=data.weekly.weeks.map(w=>w.slice(0,5)); julesData=data.weekly.jules;  ayessaData=data.weekly.ayessa; }
  else                                { labels=data.monthly.months;                    julesData=data.monthly.jules; ayessaData=data.monthly.ayessa; }

    type: currentView === 'monthly' ? 'bar' : 'line',
    data: { labels, datasets: [
      { label:'Jules',  data:julesData,  borderColor:'#c9960c', backgroundColor:'rgba(201,150,12,0.12)', borderWidth:2, pointRadius:currentView==='daily'?0:4, pointHoverRadius:6, fill:true, tension:0.4 },

async function loadOverviewPage() {
  const el = document.getElementById('app-overview');
  const needsCalls  = !window._callsData;
  const needsAppts  = !window._apptsData;
  const needsConfig = !window._configData;
  const needsAds    = !window._adsData;
  if (needsCalls || needsAppts || needsConfig || needsAds) {
    el.innerHTML = '<div class="loading"><div class="spinner"></div>building overview...</div>';
    const fetches = [];
    if (needsCalls)  fetches.push(fetchCallsData().then(d  => { if(d)  window._callsData  = d; }));
    if (needsAppts)  fetches.push(fetchApptsData().then(d  => { if(d)  window._apptsData  = d; }));
    if (needsConfig) fetches.push(fetchClientConfig().then(d=> { if(d)  window._configData = d; }));
    if (needsAds)    fetches.push(fetchAdsData().then(d    => { window._adsData = Object.keys(d||{}).length ? d : null; }));
    await Promise.all(fetches);
  }
  renderOverview();
}

async function loadCallsPage() {
  if (window._callsData) { renderCalls(window._callsData); return; }
  document.getElementById('app-calls').innerHTML = '<div class="loading"><div class="spinner"></div>loading call data...</div>';
  const [callsData, todayAppts] = await Promise.all([fetchCallsData(), fetchTodayApptCounts()]);
  window._todayApptsData = todayAppts || { jules: 0, ayessa: 0 };
  if (callsData) { window._callsData = callsData; renderCalls(callsData); }
  else document.getElementById('app-calls').innerHTML = '<div class="loading" style="opacity:0.5">Could not load call data — check proxy or network.</div>';
}

async function loadApptsPage() {
  if (window._apptsData) { renderAppts(window._apptsData); return; }
  document.getElementById('app-appts').innerHTML = '<div class="loading"><div class="spinner"></div>loading appointments...</div>';
  const [apptsData, configData] = await Promise.all([fetchApptsData(), fetchClientConfig()]);
  window._configData = configData || {};
  if (apptsData) { window._apptsData = apptsData; renderAppts(apptsData); }
  else document.getElementById('app-appts').innerHTML = '<div class="loading" style="opacity:0.5">Could not load appointments — check proxy or network.</div>';
}

let _cbRefreshTimer = null;

function cbRelTime(ts) {
  const secs = Math.floor(Date.now() / 1000 - parseFloat(ts));
  if (secs < 60)    return 'just now';
  if (secs < 3600)  return `${Math.floor(secs/60)} min ago`;
  if (secs < 86400) return `${Math.floor(secs/3600)}h ago`;
  const d = new Date(parseFloat(ts) * 1000);
  return d.toLocaleDateString('en-AU', {day:'2-digit', month:'short'}) + ' ' +
         d.toLocaleTimeString('en-AU', {hour:'2-digit', minute:'2-digit'});
}

function parseCallbackMsg(msg) {
  const text = msg.text || '';
  if (!/NBOUND CALL HOT LEAD/i.test(text)) return null;
  const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  const companyRaw  = lines[1] || '';
  const company     = companyRaw.replace(/\*/g, '').trim();
  const nameLine    = lines[2] || '';
  const nameMatch   = nameLine.match(/^(.+?)\s+is calling you back/i);
  const name = nameMatch ? nameMatch[1] : nameLine;
  const cbUrlSlack = text.match(/<(https:\/\/app\.gohighlevel\.com\/[^|>\s]+)[|>]/);
  const cbUrlPlain = text.match(/https:\/\/app\.gohighlevel\.com\/[^\s<>|"')]+/);
  const url  = cbUrlSlack ? cbUrlSlack[1] : (cbUrlPlain ? cbUrlPlain[0] : null);
  const agent = getAgent(company);
  return { ts: msg.ts, company, name, url, agent };
}

function cbDoneSet(agent) {
  const key = `qj_callbacks_done_${agent.toLowerCase()}`;
  try { return new Set(JSON.parse(localStorage.getItem(key) || '[]')); } catch(e) { return new Set(); }
}

function cbToggleDone(ts, agent) {
  const key  = `qj_callbacks_done_${agent.toLowerCase()}`;
  const done = cbDoneSet(agent);
  if (done.has(ts)) done.delete(ts); else done.add(ts);
  localStorage.setItem(key, JSON.stringify([...done]));
  renderCallbacksList(window._cbItems || []);
}

function renderAgentColumn(agent, items) {
  const done       = cbDoneSet(agent);
  const agentItems = items.filter(i => i.agent === agent);
  const pending    = agentItems.filter(i => !done.has(i.ts)).length;
  const color      = agent === 'Jules' ? 'var(--jules)' : 'var(--ayessa)';

  const cards = agentItems.length === 0
    ? `<div class="cb-empty">No callbacks assigned to ${agent}.</div>`
    : agentItems.map(item => {
        const isDone = done.has(item.ts);
        return `
        <div class="cb-card ${isDone ? 'done' : ''}">
          <button class="cb-check" onclick="cbToggleDone('${item.ts}','${agent}')" title="${isDone ? 'Undo' : 'Mark called back'}">✓</button>
          <div class="cb-body">
            <div class="cb-company">${item.company || 'Unknown'}</div>
            <div class="cb-name">${item.name || 'Unknown contact'}</div>
            <div class="cb-meta">
              <span class="cb-time">⏱ ${cbRelTime(item.ts)}</span>
              ${item.url ? `<a class="cb-ghl-btn" href="${item.url}" target="_blank">↗ GHL</a>` : ''}
            </div>
          </div>
        </div>`;
      }).join('');

  return `
    <div style="flex:1;min-width:0;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:1rem;padding-bottom:0.75rem;border-bottom:1px solid var(--border2);">
        <div style="font-size:1rem;font-weight:800;color:${color};">${agent}</div>
        ${pending > 0 ? `<span class="cb-badge">${pending} pending</span>` : `<span style="font-size:0.65rem;font-family:'DM Mono',monospace;color:var(--green);">✓ all done</span>`}
      </div>
      <div class="cb-list">${cards}</div>
    </div>`;
}

function renderCallbacksList(items) {
  window._cbItems = items;
  const el = document.getElementById('cb-list-area');
  if (!el) return;
  el.innerHTML = `
    <div style="display:flex;gap:2rem;align-items:flex-start;">
      ${renderAgentColumn('Jules', items)}
      <div style="width:1px;background:var(--border2);align-self:stretch;"></div>
      ${renderAgentColumn('Ayessa', items)}
    </div>
    ${items.filter(i => !i.agent).length > 0 ? `
    <div style="margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid var(--border2);">
      <div style="font-size:0.65rem;font-family:'DM Mono',monospace;color:var(--muted);margin-bottom:0.75rem;">UNASSIGNED</div>
      <div class="cb-list">${items.filter(i => !i.agent).map(item => `
        <div class="cb-card">
          <div class="cb-body">
            <div class="cb-company">${item.company || 'Unknown'}</div>
            <div class="cb-name">${item.name || ''}</div>
            <div class="cb-meta">
              <span class="cb-time">⏱ ${cbRelTime(item.ts)}</span>
              ${item.url ? `<a class="cb-ghl-btn" href="${item.url}" target="_blank">↗ GHL</a>` : ''}
            </div>
          </div>
        </div>`).join('')}
      </div>
    </div>` : ''}`;
}

async function fetchAndRenderCallbacks() {
  const token   = localStorage.getItem('qj_slack_token');
  const channel = localStorage.getItem('qj_slack_channel_id');
  if (!token || !channel) return;
  const listEl = document.getElementById('cb-list-area');
  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 20000);
    const res  = await fetch(`${PROXY_URL}?service=slack_history&channel=${encodeURIComponent(channel)}&token=${encodeURIComponent(token)}`, { signal: controller.signal });
    clearTimeout(timeout);
    const data = await res.json();
    if (!data.ok) {
      if (listEl) listEl.innerHTML = `<div class="cb-empty" style="color:#f87171;">Slack error: <strong>${data.error}</strong><br><br>Make sure <code>channels:history</code> or <code>groups:history</code> is enabled on your Slack bot.</div>`;
      return;
    }
    const items = (data.messages || [])
      .map(parseCallbackMsg)
      .filter(Boolean)
      .sort((a, b) => parseFloat(b.ts) - parseFloat(a.ts));
    renderCallbacksList(items);
  } catch(e) {
    if (listEl) listEl.innerHTML = `<div class="cb-empty" style="color:#f87171;">Failed to fetch: <strong>${e.name === 'AbortError' ? 'Request timed out (20s)' : e.message}</strong></div>`;
  }
}

async function saveCallbacksSetup() {
  const token   = document.getElementById('cb-token-input').value.trim();
  const channel = document.getElementById('cb-channel-input').value.trim().replace(/^#/, '');
  if (!token || !channel) return;
  const btn = document.getElementById('cb-save-btn');
  btn.textContent = 'Connecting…'; btn.disabled = true;
  try {
    const res  = await fetch(`${PROXY_URL}?service=slack_channels&token=${encodeURIComponent(token)}`);
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);
    const ch = (data.channels || []).find(c => c.name === channel || c.id === channel);
    if (!ch) throw new Error(`Channel "${channel}" not found — make sure the bot is invited to it.`);
    localStorage.setItem('qj_slack_token',        token);
    localStorage.setItem('qj_slack_channel_id',   ch.id);
    localStorage.setItem('qj_slack_channel_name', ch.name);
    renderCallbacksPage();
  } catch(e) {
    btn.textContent = '✗ ' + e.message; btn.disabled = false;
  }
}

function cbClearSetup() {
  ['qj_slack_token','qj_slack_channel_id','qj_slack_channel_name'].forEach(k => localStorage.removeItem(k));
  clearInterval(_cbRefreshTimer);
  renderCallbacksPage();
}

  const channel = localStorage.getItem('qj_slack_channel_id');

function parseLeadMsg(msg) {
  const text = (msg.text || '').trim();
  if (!text) return null;
  const lines = text.split('\n').map(l => l.replace(/\*/g, '').trim()).filter(l => l);

  // Try to find a company name by matching against known accounts
  let company = null;
  let agent   = null;
  for (const line of lines) {
    const a = getAgent(line);
    if (a) { company = line; agent = a; break; }
  }
  if (!company) {
    for (const line of lines) {
      for (const acc of [...JULES_ACCOUNTS, ...AYESSA_ACCOUNTS]) {
        if (line.toLowerCase().includes(acc.toLowerCase().slice(0,6))) {
          company = acc; agent = getAgent(acc); break;
        }
      }
      if (company) break;
    }
  }

  // Extract labelled fields (e.g. "Name: John Smith", "Email: ...")
  function extractField(pattern) {
    const m = text.match(pattern);
    return m ? m[1].trim() : null;
  }

  const name    = extractField(/(?:name|full name|contact)[:\s]+([^\n]+)/i);
  const email   = extractField(/(?:email|e-mail)[:\s]+([^\s\n]+)/i)
               || (text.match(/[\w.+-]+@[\w-]+\.[a-z]{2,}/i) || [])[0] || null;
  const phone   = extractField(/(?:phone|mobile|number)[:\s]+([+\d\s\(\)-]{7,})/i)
               || (text.match(/(?:\+?61|0)[2-9][\d\s]{7,10}/) || [])[0] || null;
  const source  = extractField(/(?:source|lead source)[:\s]+([^\n]+)/i);
  const service = extractField(/(?:service|interested in|looking for)[:\s]+([^\n]+)/i);
  const message = extractField(/(?:message|notes?|comment)[:\s]+([^\n]+)/i);

  // GHL contact link — handle Slack's <url> and <url|label> wrapping
  const urlSlack = text.match(/<(https:\/\/app\.gohighlevel\.com\/[^|>\s]+)[|>]/);
  const urlPlain = text.match(/https:\/\/app\.gohighlevel\.com\/[^\s<>|"')]+/);
  const url = urlSlack ? urlSlack[1] : (urlPlain ? urlPlain[0] : null);

  return { ts: msg.ts, company, agent, name, email, phone, source, service, message, url, text };
}

function leadDoneSet(agent) {
  const key = `qj_leads_done_${agent.toLowerCase()}`;
  try { return new Set(JSON.parse(localStorage.getItem(key) || '[]')); } catch(e) { return new Set(); }
}

function leadToggleDone(ts, agent) {
  const key  = `qj_leads_done_${agent.toLowerCase()}`;
  const done = leadDoneSet(agent);
  if (done.has(ts)) done.delete(ts); else done.add(ts);
  localStorage.setItem(key, JSON.stringify([...done]));
  renderLeadsList(window._leadItems || []);
}

        return `

            ${item.phone   ? `<div class="cb-name"><span style="font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;">Phone&nbsp;</span><span style="color:var(--accent)">${item.phone}</span></div>` : ''}
            ${item.source  ? `<div class="cb-name"><span style="font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;">Source&nbsp;</span>${item.source}</div>` : ''}

            ${item.message ? `<div class="cb-name" style="margin-top:0.35rem;color:var(--muted);font-size:0.75rem;line-height:1.4;">${item.message}</div>` : ''}

async function fetchAndRenderLeads() {
  const token   = localStorage.getItem('qj_slack_token');
  const channel = localStorage.getItem('qj_leads_channel_id');
  if (!token || !channel) return;
  const listEl = document.getElementById('leads-list-area');
  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 20000);
    const res  = await fetch(`${PROXY_URL}?service=slack_history&channel=${encodeURIComponent(channel)}&token=${encodeURIComponent(token)}`, { signal: controller.signal });
    clearTimeout(timeout);
    const data = await res.json();
    if (!data.ok) {
      if (listEl) listEl.innerHTML = `<div class="cb-empty" style="color:#f87171;">Slack error: <strong>${data.error}</strong></div>`;
      return;
    }
    const items = (data.messages || [])
      .map(parseLeadMsg)
      .filter(Boolean)
      .sort((a, b) => parseFloat(b.ts) - parseFloat(a.ts));
    renderLeadsList(items);
  } catch(e) {
    if (listEl) listEl.innerHTML = `<div class="cb-empty" style="color:#f87171;">Failed to fetch: <strong>${e.name === 'AbortError' ? 'Request timed out (20s)' : e.message}</strong></div>`;
  }
}

async function saveLeadsSetup() {
  const token   = localStorage.getItem('qj_slack_token') || document.getElementById('leads-token-input')?.value.trim();
  const channel = document.getElementById('leads-channel-input').value.trim().replace(/^#/, '');
  if (!token || !channel) return;
  const btn = document.getElementById('leads-save-btn');
  btn.textContent = 'Connecting…'; btn.disabled = true;
  try {
    const res  = await fetch(`${PROXY_URL}?service=slack_channels&token=${encodeURIComponent(token)}`);
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);
    const ch = (data.channels || []).find(c => c.name === channel || c.id === channel);
    if (!ch) throw new Error(`Channel "${channel}" not found — make sure the bot is invited to it.`);
    if (token) localStorage.setItem('qj_slack_token', token);
    localStorage.setItem('qj_leads_channel_id',   ch.id);
    localStorage.setItem('qj_leads_channel_name', ch.name);
    renderLeadsPage();
  } catch(e) {
    btn.textContent = '✗ ' + e.message; btn.disabled = false;
  }
}

function leadsReconnect() {
  ['qj_leads_channel_id','qj_leads_channel_name'].forEach(k => localStorage.removeItem(k));
  clearInterval(_leadsRefreshTimer);
  renderLeadsPage();
}

function _renderClientsFromOverride(filter='') {
  const all = Object.entries(CLIENT_OVERVIEW_DATA).map(([name, ov]) => ({
    name, agent:'', status:'Active', businessName:name,
    liveDate:'', adBudget:'', mrrCollected:'', ufCash:'', timeline:'', overview:'', chatId:'', statsSheet:'',
    ...ov,
  }));
  _buildGrid(document.getElementById('app-clients'), all, filter);
}

function _renderClientsGrid(rows, filter='') {
  const el = document.getElementById('app-clients');
  if (!Array.isArray(rows) || rows.length < 2) { _renderClientsFromOverride(filter); return; }
  const clients = [];
  for (let i = 1; i < rows.length; i++) {
    const r = rows[i];
    const name   = String(r[0]||'').trim();
    const status = String(r[8]||'').trim();
    if (!name || status === 'Churned') continue;
    const ov = _findClientOverride(name);
    const s = f => String(f||'').trim();
    const m = (sv, ok) => s(sv) || ov[ok] || '';
    clients.push({
      name, agent:s(r[1]), chatId:s(r[2]), statsSheet:s(r[3]), liveDate:s(r[4]),
      website:m(r[5],'website'), offer:m(r[6],'offer'), overview:m(r[7],'overview'), status,
      email:m(r[9],'email'), phone:m(r[10],'phone'),
      businessName:s(r[11])||name, businessAddress:m(r[12],'businessAddress'),
      timeZone:m(r[13],'timeZone'), serviceArea:m(r[14],'serviceArea'),
      constructionCategory:m(r[15],'constructionCategory'), serviceName:m(r[16],'serviceName'),
      idealClientProfile:m(r[17],'idealClientProfile'), agreedOffer:m(r[18],'agreedOffer'),
      qualification:m(r[19],'qualification'), aimOfCall:m(r[20],'aimOfCall'),
      timeline:s(r[21]), preferredTimeSlots:m(r[22],'preferredTimeSlots'),
      adBudget:s(r[23]), mrrCollected:s(r[24]), ufCash:s(r[25]),
      billingStartDate:s(r[26]), paymentType:s(r[27]), leadSource:s(r[28]),
    });
  }
  _buildGrid(el, clients, filter);
}

const _INTEL_KEY  = 'qj_anthropic_key';
const _INTEL_HIST = 'qj_intel_history';
let _intelHistory = [];
let _intelBusy    = false;

function loadIntelligencePage() {
  const el = document.getElementById('app-intelligence');
  if (!el) return;
  try { _intelHistory = JSON.parse(localStorage.getItem(_INTEL_HIST) || '[]'); } catch(e) { _intelHistory = []; }
  const hasKey = !!localStorage.getItem(_INTEL_KEY);
  el.innerHTML = `
    <div class="intel-wrap">
      <div class="intel-top">
        <div>
          <div class="intel-title">✦ Quality Jobs Intelligence</div>
          <div class="intel-sub">AI-powered knowledge base — SOPs, clients, calls &amp; appointments</div>
        </div>
        <div class="intel-top-btns">
          <button class="intel-key-btn" onclick="_intelClear()">Clear chat</button>
          <button class="intel-key-btn" onclick="_intelShowSettings()">⚙ API Key</button>
        </div>
      </div>
      ${!hasKey ? `<div class="intel-no-key">🔑 Add your Anthropic API key to activate the assistant <button onclick="_intelShowSettings()">Add Key</button></div>` : ''}
      <div class="intel-msgs" id="intel-msgs"></div>
      <div class="intel-bar">
        <textarea class="intel-textarea" id="intel-input"
          placeholder="Ask anything — dispositions, client info, how to handle a call..."
          rows="1"
          onkeydown="_intelKeydown(event)"
          oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>
        <button class="intel-send" id="intel-send" onclick="_intelSend()" ${!hasKey?'disabled':''}>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>`;
  _intelRenderHistory();
}

function _intelRenderHistory() {
  const msgs = document.getElementById('intel-msgs');
  if (!msgs) return;
  if (!_intelHistory.length) {
    msgs.innerHTML = `
      <div class="intel-welcome">
        <div class="intel-welcome-icon">✦</div>
        <h3>Quality Jobs Intelligence</h3>
        <p>I have full knowledge of your SOPs, all client data, call performance, and appointment metrics. Ask me anything.</p>
        <div class="intel-chips">
          <button class="intel-chip" onclick="_intelSend('What are the call disposition rules?')">Call disposition rules</button>
          <button class="intel-chip" onclick="_intelSend('How do I qualify a lead?')">How to qualify a lead</button>
          <button class="intel-chip" onclick="_intelSend('Walk me through booking an appointment')">Booking an appointment</button>
          <button class="intel-chip" onclick="_intelSend('What clients are we currently calling for?')">Active clients</button>
          <button class="intel-chip" onclick="_intelSend('What do I do if a lead keeps going to voicemail?')">Lead keeps going to voicemail</button>
          <button class="intel-chip" onclick="_intelSend('How do I navigate Go High Level?')">Navigating GHL</button>
        </div>
      </div>`;
    return;
  }
  msgs.innerHTML = _intelHistory.map(m => _intelBubble(m.role, m.content)).join('');
  msgs.scrollTop = msgs.scrollHeight;
}

function _intelBubble(role, content) {
  return `<div class="intel-bubble ${role}">
    <div class="intel-avatar">${role==='user'?'You':'✦'}</div>
    <div class="intel-text">${_intelMd(content)}</div>
  </div>`;
}

function _intelMd(raw) {
  let t = raw.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  t = t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  t = t.replace(/`([^`]+)`/g,'<code>$1</code>');
  t = t.replace(/^#{1,3} (.+)$/gm,'<strong>$1</strong>');
  t = t.replace(/^-{3,}$/gm,'<hr>');
  const blocks = t.split(/\n\n+/);
  return blocks.map(b => {
    b = b.trim(); if (!b) return '';
    if (/^[-•*] /m.test(b)) {
      const items = b.split('\n').filter(l=>l.trim()).map(l=>`<li>${l.replace(/^[-•*] /,'')}</li>`).join('');
      return `<ul>${items}</ul>`;
    }
    if (/^\d+\. /m.test(b)) {
      const items = b.split('\n').filter(l=>l.trim()).map(l=>`<li>${l.replace(/^\d+\. /,'')}</li>`).join('');
      return `<ol>${items}</ol>`;
    }
    if (b.startsWith('<hr>') || b.startsWith('<ul>') || b.startsWith('<ol>')) return b;
    return `<p>${b.replace(/\n/g,'<br>')}</p>`;
  }).filter(Boolean).join('');
}

function _intelKeydown(e) {
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); _intelSend(); }
}

async function _intelSend(prefill) {
  if (_intelBusy) return;
  const apiKey = localStorage.getItem(_INTEL_KEY);
  if (!apiKey) { _intelShowSettings(); return; }
  const input = document.getElementById('intel-input');
  const text  = (prefill || (input ? input.value : '')).trim();
  if (!text) return;
  if (input) { input.value=''; input.style.height='auto'; }

  const msgs = document.getElementById('intel-msgs');
  const welcome = msgs && msgs.querySelector('.intel-welcome');
  if (welcome) welcome.remove();

  _intelHistory.push({ role:'user', content:text });
  msgs && msgs.insertAdjacentHTML('beforeend', _intelBubble('user', text));

  const typId = 'it'+Date.now();
  msgs && msgs.insertAdjacentHTML('beforeend',`
    <div class="intel-bubble assistant" id="${typId}">
      <div class="intel-avatar">✦</div>
      <div class="intel-text"><div class="intel-typing"><span></span><span></span><span></span></div></div>
    </div>`);
  msgs && (msgs.scrollTop = msgs.scrollHeight);

  _intelBusy = true;
  const btn = document.getElementById('intel-send');
  if (btn) btn.disabled = true;

  try {
    const reply = await _intelCallAPI(apiKey);
    document.getElementById(typId)?.remove();
    _intelHistory.push({ role:'assistant', content:reply });
    msgs && msgs.insertAdjacentHTML('beforeend', _intelBubble('assistant', reply));
    try { localStorage.setItem(_INTEL_HIST, JSON.stringify(_intelHistory.slice(-50))); } catch(e){}
  } catch(err) {
    document.getElementById(typId)?.remove();
    const msg = err.message || 'Something went wrong. Check your API key.';
    msgs && msgs.insertAdjacentHTML('beforeend', _intelBubble('assistant', `⚠️ ${msg}`));
  }

  _intelBusy = false;
  if (btn) btn.disabled = false;
  msgs && (msgs.scrollTop = msgs.scrollHeight);
}

async function _intelCallAPI(apiKey) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key': apiKey,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-ipc':'true'
    },
    body: JSON.stringify({
      model:'claude-3-5-haiku-20241022',
      max_tokens:1500,
      system: _intelSystem(),
      messages: _intelHistory.map(m=>({ role:m.role, content:m.content }))
    })
  });
  if (!res.ok) {
    const b = await res.json().catch(()=>({}));
    throw new Error(b.error?.message || `API error ${res.status}`);
  }
  const data = await res.json();
  return data.content?.[0]?.text || 'No response received.';
}

function _intelSystem() {
  let s = `You are the Quality Jobs AI Assistant — a smart, practical knowledge base for the Quality Jobs CSR (Customer Service Representative) calling team.

Quality Jobs is an Australian company providing professional calling agents who qualify homeowners and book renovation appointments on behalf of trade and construction clients.

---

## CALL DISPOSITION RULES

1. **No Answer → Click Next**
   The lead did not pick up. Select the Next disposition. The dialer moves to the next lead automatically and cycles back.

2. **Lead Answers but Does NOT Qualify → Click Disqualify (DQ)**
   Failed criteria: wrong location, insufficient budget, not a homeowner, or wrong timeframe.
   Select DQ immediately. Always be respectful. Never re-engage a disqualified lead.

3. **Lead Wants a Callback in 1 Week / 2 Weeks / 3 Weeks / 1 Month**
   Lead showed interest but wants future contact. Select the matching disposition.
   Always log key notes in the CRM before moving on.

4. **Lead Wants a Callback Later Today or Tomorrow → Book in Callback Calendar (GHL)**
   Lead is busy right now and requests a specific callback time.
   Do NOT select a disposition — open Go High Level and book into the Callback Calendar. Note the exact time requested.

5. **Lead Qualifies → Book in Client's Booking Calendar (GHL)**
   All criteria passed: correct location, sufficient budget, is a homeowner, right timeframe.
   Book directly into the client's booking calendar in GHL.
   Confirm appointment date and time with the lead. Record all details before closing the call.

6. **10+ Voicemails with No Response → Click Disqualify (DQ)**
   Minimum 10 call attempts required before DQ. Never DQ before 10 attempts.
   If the lead has replied to SMS or shown any engagement at any point, keep calling.

---

## SOP TRAINING MODULES\n\n`;

  SOP_MODULES.forEach(mod => {
    s += `### ${mod.title}\n`;
    mod.videos.forEach(v => {
      if (!v.title) return;
      s += `- **${v.title}**`;
      if (v.description) s += `: ${v.description}`;
      if (v.docs && v.docs.length) s += ` | Linked documents: ${v.docs.map(d=>d.title).join(', ')}`;
      s += '\n';
    });
    s += '\n';
  });

  s += `---\n\n## ACTIVE CLIENT LIST\n\n`;
  if (window._clientsData && window._clientsData.length) {
    window._clientsData.forEach(c => {
      if (!c.clientName) return;
      s += `**${c.clientName}**`;
      if (c.agent)         s += ` | Agent: ${c.agent}`;
      if (c.serviceArea)   s += ` | Service Area: ${c.serviceArea}`;
      if (c.qualification) s += ` | Qualification: ${c.qualification}`;
      if (c.aimOfCall)     s += ` | Aim of call: ${c.aimOfCall}`;
      if (c.agreedOffer)   s += ` | Agreed offer: ${c.agreedOffer}`;
      s += '\n';
    });
  } else {
    s += 'Client data is loading from Google Sheets.\n';
  }

  s += `\n---\n\n## YOUR ROLE
- Answer questions from CSR agents about call procedures, SOPs, client requirements, and GHL navigation.
- Help agents handle specific call situations with clear, actionable guidance.
- Be direct, practical, and concise. Use bullet points for steps. Bold key terms and actions.
- If something is not in your knowledge base, say so clearly rather than guessing.`;

  return s;
}

function _intelClear() {
  _intelHistory = [];
  localStorage.removeItem(_INTEL_HIST);
  _intelRenderHistory();
}

function _intelShowSettings() {
  document.getElementById('intel-overlay')?.remove();
  const k = localStorage.getItem(_INTEL_KEY) || '';
  document.body.insertAdjacentHTML('beforeend',`
    <div class="intel-overlay" id="intel-overlay" onclick="if(event.target===this)_intelCloseSettings()">
      <div class="intel-modal">
        <h3>🔑 Anthropic API Key</h3>
        <p>Stored locally in your browser only — never leaves your device.<br>
        Get your key at <strong>console.anthropic.com</strong> → API Keys.</p>
        <input type="password" id="intel-key-field" placeholder="sk-ant-api03-..." value="${k}" autocomplete="off"
          onkeydown="if(event.key==='Enter')_intelSaveKey()"/>
        <div class="intel-modal-actions">
          <button class="intel-modal-cancel" onclick="_intelCloseSettings()">Cancel</button>
          <button class="intel-modal-save" onclick="_intelSaveKey()">Save Key</button>
        </div>
      </div>
    </div>`);
  setTimeout(()=>document.getElementById('intel-key-field')?.focus(),50);
}

function _intelSaveKey() {
  const v = (document.getElementById('intel-key-field')?.value||'').trim();
  if (v) localStorage.setItem(_INTEL_KEY, v);
  else   localStorage.removeItem(_INTEL_KEY);
  _intelCloseSettings();
  loadIntelligencePage();
}

function _intelCloseSettings() {
  document.getElementById('intel-overlay')?.remove();
}
